<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Bosi — Reimposta password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg:#0c0c0a; --surface:#1a1a16; --surface2:#222219; --border:#2e2e28; --border2:#3a3a32; --text:#f0ede4; --muted:#7a7870; --accent:#d4a843; --danger:#e05555; --success:#4caf82; --font-h:'Syne',sans-serif; --font-b:'DM Sans',sans-serif; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { width: 380px; padding: 44px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
.card img { display: block; height: 44px; margin-bottom: 22px; }
h1 { font-family: var(--font-h); font-size: 22px; color: var(--accent); margin-bottom: 8px; }
p { color: var(--muted); font-size: 13px; margin-bottom: 26px; line-height: 1.5; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.field input { padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 14px; }
.field input:focus { outline: none; border-color: var(--accent); }
button { width: 100%; padding: 12px; background: var(--accent); color: #0c0c0a; font-family: var(--font-h); font-weight: 700; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; margin-top: 6px; }
button:hover { background: #e8bc55; }
.msg { font-size: 12px; margin-top: 12px; min-height: 18px; }
.msg.error { color: var(--danger); }
.msg.success { color: var(--success); }
a.back { display: block; text-align: center; margin-top: 18px; font-size: 12px; color: var(--muted); text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <img src="logo.png" alt="Bosi" onerror="this.style.display='none'">
  <h1>Reimposta password</h1>
  <p>Inserisci la nuova password per il tuo account Planner Bosi.</p>
  <div class="field"><label>Nuova password</label><input type="password" id="p1" placeholder="Minimo 6 caratteri"></div>
  <div class="field"><label>Conferma password</label><input type="password" id="p2" placeholder="Ripeti la password"></div>
  <button onclick="updatePassword()">Salva nuova password</button>
  <div class="msg" id="msg"></div>
  <a class="back" href="manager.html">← Torna al login</a>
</div>
<script>
const SUPABASE_URL      = 'https://wdepuzaorntgbbvghgun.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'sb_publishable_VvLFT1S5qMolUs4007bcNA_rzIHVxFU';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Supabase gestisce automaticamente la sessione di recupero dal link nell'email
// (il token è nell'URL hash, letto automaticamente dal client JS)

async function updatePassword() {
  const p1 = document.getElementById('p1').value;
  const p2 = document.getElementById('p2').value;
  const msg = document.getElementById('msg');
  msg.className = 'msg';
  if (p1.length < 6) { msg.textContent = 'La password deve avere almeno 6 caratteri'; msg.className = 'msg error'; return; }
  if (p1 !== p2) { msg.textContent = 'Le due password non coincidono'; msg.className = 'msg error'; return; }
  const { error } = await sb.auth.updateUser({ password: p1 });
  if (error) { msg.textContent = 'Errore: ' + error.message; msg.className = 'msg error'; return; }
  msg.textContent = 'Password aggiornata! Ora puoi tornare al login.';
  msg.className = 'msg success';
}
</script>
</body>
</html>
